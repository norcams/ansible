---

- hosts: "{{ myhosts }}"
  vars:
    silence_sensu: true
  tasks:

    - name: Silence sensu using <loc>-proxy-02
      ansible.builtin.command:
        cmd: "bin/python sensu.py silence -C '*' -H  {{ inventory_hostname }}  -r 'ansible triggered reboot'"
        chdir: "{{ himlarcli_path }}"
      delegate_to: "{{ inventory_hostname.split('-') | first }}-proxy-02"
      when: silence_sensu == true

    - name: Rebooting...
      ansible.builtin.reboot:
        reboot_timeout: 1800

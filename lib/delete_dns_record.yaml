---
# Example:
# sudo ansible-playbook -e myhosts=bgo-admin-01 -e record=bgo-compute-l40s-093.mgmt.bgo.uhdc.no -e type=A lib/delete_dns_record.yaml
#
#
- hosts: "{{ myhosts }}"

  tasks:
  - name: "Delete DNS record {{ record }}"
    shell: "echo -e 'server {{ location }}-ns-01.{{ domain }}\ndelete {{ record }} {{ type }}\nsend' | nsupdate -k /etc/rndc-admin.key"
